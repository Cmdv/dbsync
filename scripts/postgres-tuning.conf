# Postgres tuning for dbsync bulk-load on the 4-core / 16 GB target.
#
# Paste into postgresql.conf (or include via include_dir) and restart
# the server once before the first dbsync run. The wal_level and
# checkpoint settings cannot be changed without a restart; the rest
# can be tuned via ALTER SYSTEM and a reload.
#
# Important: wal_level = minimal disables WAL shipping. Any logical
# or physical replicas will need a full re-base after reverting to
# wal_level = replica. This is acceptable for a one-time fresh sync
# from genesis but operators running an HA pair should weigh the
# trade-off before enabling minimal.

# ---------------------------------------------------------------------------
# WAL — the single biggest win for the post-load LOGGED flip.
# ---------------------------------------------------------------------------

# Skips WAL on COPY (when CREATE+COPY share a transaction — not our
# case) AND on ALTER TABLE ... SET LOGGED for tables larger than
# wal_skip_threshold. The latter is what PreparingForChainTip
# benefits from: the heap rewrite fsyncs directly instead of
# streaming through WAL.
wal_level = minimal
max_wal_senders = 0
archive_mode = off

# Larger checkpoint window lets the LOGGED flip and the post-flip
# work finish within one or two checkpoints instead of forcing
# emergency ones. 32 GB is comfortable on disks with ≥ 200 GB free.
max_wal_size = 32GB
checkpoint_timeout = 30min
checkpoint_completion_target = 0.9

# Cheap CPU, smaller WAL. Material when wal_level is not minimal
# (replicas, archive) and the COPY path is still WAL-logged.
wal_compression = on

# ---------------------------------------------------------------------------
# Memory — sized for 4 GB shared_buffers + room for one Prep backend.
# ---------------------------------------------------------------------------

# Standard 25 % of RAM for shared_buffers on a 16 GB box.
shared_buffers = 4GB

# OS page cache estimate; informs the planner's IO costing only.
effective_cache_size = 12GB

# Per-backend cap. PreparingForChainTip applies a per-session SET
# of '2GB' inside the post-load pass; this server-side default
# governs autovacuum workers and any one-off maintenance the
# operator runs manually.
maintenance_work_mem = 1GB

# Per-sort/hash cap. Conservative; ingest doesn't lean on this.
work_mem = 64MB

# ---------------------------------------------------------------------------
# Parallelism — match worker counts to core count.
# ---------------------------------------------------------------------------

max_parallel_workers = 4
max_parallel_workers_per_gather = 2
max_parallel_maintenance_workers = 3

# ---------------------------------------------------------------------------
# Bulk-load hygiene.
# ---------------------------------------------------------------------------

# Async commit is safe for Ingest: a crash rewinds to Ingest's last
# committed epoch, not to commit granularity. Prep applies the same
# setting per-session via SET; this server-side default helps any
# ad-hoc tooling operators run during sync.
synchronous_commit = off

# Autovacuum during the bulk pass competes with COPY for shared
# buffers and I/O. Either disable globally during Ingest and turn
# back on for Follow, or set the autovacuum thresholds high enough
# that bulk inserts never trigger it:
#
#   autovacuum = off                       # turn off; remember to re-enable
#
# Or, less invasive:
#   autovacuum_naptime = 30min
#   autovacuum_vacuum_cost_delay = 100ms
